.debrief-robot-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:4px}

<script>
const _compMusic=new Audio('../audio/music/module-complete.mp3');_compMusic.loop=true;(window.__bgAudio=window.__bgAudio||[]).push(_compMusic);_compMusic.volume=0.4;_compMusic.play().catch(function(){document.addEventListener('click',function h(){_compMusic.play().catch(function(){});document.removeEventListener('click',h);});});window.addEventListener('pageshow',function(e){if(e.persisted)_compMusic.play().catch(function(){});});
const OPERATOR   = localStorage.getItem('nexus_current_operator')||'operator';
const MODULE_KEY = 'mod4';
const BADGE_KEY  = 'architect';

const CIRO_LINES = [
  { text: "I've run many variations of the future, and every time you reach this point you become indistinguishable from the ones who never started.", pauseAfter: 950 },
  { text: "The ones who continue become something else entirely.", pauseAfter: 900 },
  { text: "Continue on. Now you're building systems. Architect confirmed.", pauseAfter: 300 },
];

function writeComplete(){
  try{
    const raw = localStorage.getItem('nexus_'+OPERATOR);
    const s   = raw ? JSON.parse(raw) : {};
    s[MODULE_KEY+'_complete'] = true;
    s['badge_'+BADGE_KEY] = true;
    localStorage.setItem('nexus_'+OPERATOR, JSON.stringify(s));
    const keysToRemove = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('nexus_ts_') && k.includes('module-4')) keysToRemove.push(k);
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
  } catch(e){ console.warn('nexus localStorage write failed', e); }
}

function pingHub(){
  try{
    const target = window.opener || window.parent;
    if(target && target !== window){
      target.postMessage({ type:'MODULE_COMPLETE', moduleKey:MODULE_KEY, operator:OPERATOR }, '*');
      target.postMessage({ type:'BADGE_EARNED', badgeKey:BADGE_KEY, operator:OPERATOR }, '*');
    }
  } catch(e){}
}

function runReveal(){
  setTimeout(function(){playS("../audio/sfx/wait-sound.wav",0.1);},200);
  setTimeout(()=> document.getElementById('completion-badge').classList.add('animate-in'), 200);
  setTimeout(()=> document.getElementById('label-2').classList.add('animate-in'), 500);
  setTimeout(()=> document.getElementById('label-3').classList.add('animate-in'), 680);
  setTimeout(()=> document.getElementById('debrief-wrap').classList.add('animate-in'), 900);
  setTimeout(runCiro, 1100);
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeLine(el, text){
  const cursor = document.createElement('span');
  cursor.style.cssText = 'display:inline-block;width:8px;height:14px;background:#00c8ff;vertical-align:middle;margin-left:2px;animation:cur .7s step-end infinite';
  el.appendChild(cursor);
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    el.insertBefore(document.createTextNode(ch), cursor);
    let d = 30;
    if(ch==='.') d+=110;
    else if(ch===',') d+=55;
    else if(ch==='—') d+=70;
    await wait(d);
  }
  cursor.remove();
}

async function runCiro(){
  const container = document.getElementById('ciro-lines');
  await wait(300);
  for(const { text, pauseAfter } of CIRO_LINES){
    const lineEl = document.createElement('div');
    lineEl.className = 'ciro-line';
    container.appendChild(lineEl);
    await typeLine(lineEl, text);
    await wait(pauseAfter);
  }
  await wait(400);
  document.getElementById('hub-cta').classList.add('visible');
}

writeComplete();
pingHub();
runReveal();

const STUDY_MODULE = 'Module 4 — The Agent Blueprint';
const STUDY_LESSONS = [{n:'4.1',title:'You\'re Not Behind (Yet): How to Build AI Agents in 2026',file:'lesson-4-1.html',takeaways:['An AI agent is a system that can reason, plan, and take actions on its own based on the information it\'s given — think of it as a digital employee that can use tools and make decisions.','The critical distinction: a workflow runs through a fixed, pre-defined sequence of steps. An agent decides how many steps to take and which ones — you don\'t know in advance.','Agents need three things to function: a goal or task, access to tools (search, APIs, files, etc.), and a loop — the ability to keep running until the task is resolved.','You don\'t need a technical background to build them anymore. The barrier is understanding the architecture, not writing code.','The agents cutting the most time aren\'t replacing entire roles — they\'re compressing specific high-volume workflows from hours to minutes. That\'s where to start.']},{n:'4.2',title:'Tips for Building AI Agents',file:'lesson-4-2.html',takeaways:['Workflows vs. agents isn\'t a hierarchy — it\'s a spectrum. Many production systems are a mix: structured steps where the path is known, agent loops where it isn\'t.','Tool descriptions matter as much as the agent\'s instructions. A vague tool description produces uncertain tool use. Write them like you\'d brief a new hire.','Most agent failures aren\'t model failures — they\'re design failures. Poorly scoped tasks, ambiguous instructions, missing context. Start simpler than you think you need to.','Build measurement in from the start. Agents that aren\'t being evaluated can\'t be improved.','Avoid the over-engineering trap: some of the best-performing production systems run everything inside a single LLM call. Complexity doesn\'t equal capability.','Where agents genuinely outperform simple automation: tasks where the number of steps is unknown, tasks requiring judgment between multiple options, and tasks that need to recover from unexpected results mid-run.']},{n:'4.3',title:'Claude Ran a Business in Our Office',file:'lesson-4-3.html',takeaways:['Claude handled the expected parts well: pricing logic, inventory reasoning, structured decisions with clear criteria.','The test revealed the agent\'s limits: ambiguous situations, customer interactions requiring judgment calls, and tasks that needed context the agent didn\'t have access to.','Autonomous agents in production need clearly defined boundaries — what the agent can decide alone and what needs a human checkpoint. Vague scope produces unexpected behavior.']},{n:'4.4',title:'I Built a Marketing Team with 1 AI Agent and No Code',file:'lesson-4-4.html',takeaways:['A single agent can access multiple tools simultaneously — this one routes between six distinct workflows based on what you ask it. One agent, many capabilities.','The agent doesn\'t just produce content — it maintains a log of everything it creates (type, prompt, Drive link), which becomes a searchable asset library over time.','The interface (Telegram, voice or text) is separate from the logic. Changing the interface doesn\'t change the workflows beneath it.','Each workflow is modular — video creation, image generation, and blog writing are independent nodes. Break one and the others keep running.','Real operational cost: the video covers what this system actually costs to run monthly. Build with that number in mind before deploying for a client.']},{n:'4.5',title:'Every Claude Code Concept Explained for Normal People',file:'lesson-4-5.html',takeaways:['Claude Code gives Claude access to tools that operate on your computer: reading and writing files, running bash commands, and navigating directories. That\'s the fundamental difference from chat — it can act, not just respond.','Context rot happens as sessions grow long: Claude starts losing track of earlier instructions and details. The fix is starting clean sessions for new tasks and using memory files to preserve critical context across sessions.','Subagents are separate Claude instances that run with their own clean context windows, following instructions from the main agent. When a task grows complex, the main agent delegates to subagents rather than cramming everything into one bloated context.','MCP servers are how Claude Code connects to external tools.','You don\'t tell Claude which tool to use. You describe what you want. Claude picks the right tools automatically.']},{n:'4.6',title:'Claude Design Basics: Master 95% in 10 Minutes',file:'lesson-4-6.html',takeaways:['Four starting modes: Prototype (wireframe or high-fidelity), Slide deck, From template, or Other. High-fidelity mode is where most of the leverage is.','The most-skipped step (and the most important): providing visual reference material. Claude Design performs significantly better when it can see examples of the aesthetic you\'re aiming for — screenshots, URLs, or uploaded images.','You can export prototypes directly to code — HTML/CSS/React — making it a practical starting point for real builds, not just mockups.','Weekly Usage Limits for Claude Design are separate from your regular Claude account limits.']},{n:'4.7',title:'I Built 5 Websites in 18 Minutes with Claude',file:'lesson-4-7.html',takeaways:['Claude\'s built-in design aesthetic is strong enough that you don\'t need to supply inspiration — you need to supply a clear, structured prompt.','The prompt framework that works: [type of site] for [specific business], [tone/aesthetic], [key sections needed], [any reference or constraint]. Vague prompts produce generic output; specific prompts produce specific work.','Iteration is the workflow. The first output is a draft, not the deliverable. Every pass narrows from a rough direction to a polished result.','Claude builds in the Artifacts panel — you see the site rendered live as it writes. Changes are instant.']},{n:'4.8',title:'Claude Works with You on Slides, Spreadsheets, and Contract Redlines',file:'lesson-4-8.html',takeaways:['Claude now works inside Excel and PowerPoint — formatting, populating, and structuring real files, not generating text to paste elsewhere.','The contract redline demo is particularly relevant for service providers: Claude reads an existing contract, identifies clauses to revise, and marks changes in tracked-changes format — the standard output format for legal and client-facing work.','This closes the loop between generation and delivery. The output is the file the client receives.']}];
const STUDY_CIRO = 'Agents don\'t replace you — they multiply you.<br>You\'ve built the blueprint. Now build.<br><br>— CIRO';
