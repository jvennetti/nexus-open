<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Academy — The Machine</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=Lexend:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020609;
  --panel:#070e1a;
  --inset:#040b14;
  --blue:#00c8ff;
  --amber:#ffaa00;
  --red:#ff3333;
  --white:#ffffff;
  --offwhite:#e8f4fc;
  --muted:#2a4055;
}
html,body{
  width:100vw;height:100vh;
  background:var(--bg);
  color:var(--white);
  font-family:'Lexend',sans-serif;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
body::before{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.15) 3px,rgba(0,0,0,0.15) 4px);
  pointer-events:none;z-index:9999;
}
body::after{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 75% 75% at 50% 50%,transparent 35%,rgba(0,0,0,0.8) 100%);
  pointer-events:none;z-index:9998;
}
#page-tint{position:fixed;inset:0;background:transparent;pointer-events:none;z-index:9997;transition:background 0.5s}
#machine-geo{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.auth-panel{
  position:relative;z-index:10;
  width:680px;
  background:var(--panel);
  border:1px solid rgba(0,200,255,0.18);
  border-radius:6px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(0,0,0,0.9),
    0 0 80px rgba(0,0,0,0.98),
    0 0 160px rgba(0,0,0,0.9),
    inset 0 0 50px rgba(0,0,0,0.5);
}
.auth-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(0,200,255,0.55) 35%,rgba(0,200,255,0.8) 50%,rgba(0,200,255,0.55) 65%,transparent 95%);
}
.panel-topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 28px 11px;
  border-bottom:1px solid rgba(0,200,255,0.07);
  background:rgba(0,0,0,0.25);
}
.topbar-id{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:0.4em;
  color:var(--muted);text-transform:uppercase;
}
.topbar-status{display:flex;align-items:center;gap:8px}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--red);box-shadow:0 0 7px var(--red);
  animation:dot-blink 2s ease-in-out infinite;
  transition:background 0.6s,box-shadow 0.6s;
}
.status-dot.ok{background:var(--blue);box-shadow:0 0 9px var(--blue);animation:none}
@keyframes dot-blink{0%,100%{opacity:1}50%{opacity:0.2}}
.status-txt{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:0.3em;
  color:rgba(255,51,51,0.55);text-transform:uppercase;
  transition:color 0.6s;
}
.status-txt.ok{color:rgba(0,200,255,0.55)}
.scan-line{
  height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,200,255,0.45) 40%,rgba(0,200,255,0.7) 50%,rgba(0,200,255,0.45) 60%,transparent 100%);
  animation:scan-anim 3.8s ease-in-out infinite;
  opacity:0;
}
@keyframes scan-anim{
  0%{opacity:0;background-position:-100% 0}
  10%{opacity:0.7}
  90%{opacity:0.7}
  100%{opacity:0;background-position:200% 0}
}
.panel-body{padding:36px 44px 32px}
.warning-title{
  text-align:center;
  margin-bottom:28px;
}
.wt-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:0.5em;
  color:rgba(255,170,0,0.5);text-transform:uppercase;
  margin-bottom:10px;
}
.wt-main{
  font-family:'Orbitron',sans-serif;
  font-size:17px;font-weight:900;
  letter-spacing:0.04em;
  color:var(--white);
  text-transform:uppercase;
  line-height:1.4;
  margin-bottom:10px;
  text-shadow:0 0 30px rgba(255,255,255,0.08);
}
.wt-main span{color:var(--blue);text-shadow:0 0 20px rgba(0,200,255,0.5)}
.wt-sub{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:300;
  color:rgba(180,215,235,0.55);
  letter-spacing:0.02em;
  line-height:1.5;
}
.divider{
  width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,200,255,0.15),transparent);
  margin:0 0 30px;
}
.ops-stack{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.op-slot{position:relative}
.slot-pill{
  display:flex;align-items:center;
  background:var(--inset);
  border:1px solid rgba(0,200,255,0.12);
  border-radius:40px;
  padding:0 8px 0 26px;
  gap:10px;
  transition:border-color 0.4s,box-shadow 0.4s,background 0.4s;
}
.slot-pill:focus-within{
  border-color:rgba(0,200,255,0.32);
  box-shadow:0 0 22px rgba(0,200,255,0.08),inset 0 0 14px rgba(0,200,255,0.04);
}
.slot-pill.confirmed{
  border-color:rgba(0,200,255,0.35);
  background:#040c18;
  box-shadow:0 0 24px rgba(0,200,255,0.1),inset 0 0 16px rgba(0,200,255,0.04);
}
.slot-pill.error-flash{
  border-color:rgba(255,51,51,0.5);
  box-shadow:0 0 16px rgba(255,0,0,0.12);
}
.op-input{
  flex:1;background:transparent;border:none;outline:none;
  padding:15px 0;
  color:var(--white);
  font-family:'IBM Plex Mono',monospace;
  font-size:14px;letter-spacing:0.12em;
  caret-color:var(--blue);
}
.op-input::placeholder{
  color:rgba(255,255,255,0.38);
  letter-spacing:0.08em;
  font-size:13px;
}
.op-input:disabled{opacity:0;pointer-events:none;width:0;padding:0}
.slot-check{
  display:none;
  width:32px;height:32px;border-radius:50%;
  border:1.5px solid rgba(0,200,255,0.65);
  background:rgba(0,200,255,0.1);
  box-shadow:0 0 16px rgba(0,200,255,0.35);
  align-items:center;justify-content:center;
  flex-shrink:0;
  animation:check-pop 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
.slot-check svg{stroke:var(--blue);stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
@keyframes check-pop{0%{transform:scale(0);opacity:0}65%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.sealed-name{
  display:none;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;letter-spacing:0.12em;
  color:rgba(0,200,255,0.5);
  padding:15px 0 15px 26px;
  flex:1;
}
.slot-sealed-label{
  display:none;
  font-family:'IBM Plex Mono',monospace;
  font-size:7.5px;letter-spacing:0.3em;
  color:rgba(0,200,255,0.28);text-transform:uppercase;
  text-align:center;
  margin-top:5px;
}
.restore-btn{
  width:100%;
  font-family:'Orbitron',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;
  color:rgba(200,50,50,0.85);
  background:rgba(180,0,0,0.06);
  border:1px solid rgba(200,30,30,0.32);
  border-radius:5px;
  padding:16px 0;
  cursor:pointer;
  transition:all 0.22s;
  animation:btn-fault 2.4s ease-in-out infinite;
  margin-bottom:0;
}
.restore-btn:hover{
  background:rgba(180,0,0,0.15);
  border-color:rgba(255,55,55,0.58);
  color:rgba(255,80,80,0.95);
  box-shadow:0 0 30px rgba(200,0,0,0.42),0 0 60px rgba(200,0,0,0.12);
  animation:none;transform:translateY(-1px);
}
@keyframes btn-fault{
  0%,100%{box-shadow:0 0 8px rgba(200,0,0,0.25);border-color:rgba(200,30,30,0.32)}
  50%{box-shadow:0 0 24px rgba(200,0,0,0.5),0 0 45px rgba(200,0,0,0.16);border-color:rgba(255,50,50,0.62)}
}
.restore-btn.all-ok{
  color:rgba(0,200,255,0.92);
  background:rgba(0,200,255,0.07);
  border-color:rgba(0,200,255,0.4);
  animation:btn-ready 1.8s ease-in-out infinite;
}
.restore-btn.all-ok:hover{
  color:#fff;background:rgba(0,200,255,0.13);
  border-color:rgba(0,200,255,0.68);
  box-shadow:0 0 30px rgba(0,200,255,0.42),0 0 65px rgba(0,200,255,0.14);
  animation:none;
}
@keyframes btn-ready{
  0%,100%{box-shadow:0 0 12px rgba(0,200,255,0.3)}
  50%{box-shadow:0 0 30px rgba(0,200,255,0.55),0 0 58px rgba(0,200,255,0.18)}
}
.error-line{
  text-align:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;letter-spacing:0.22em;
  color:rgba(255,51,51,0.7);text-transform:uppercase;
  margin-top:11px;min-height:14px;
  opacity:0;transition:opacity 0.25s;
}
.error-line.show{opacity:1}
.panel-footer{
  padding:11px 28px 13px;
  border-top:1px solid rgba(0,200,255,0.06);
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(0,0,0,0.28);
}
.pf-mono{
  font-family:'IBM Plex Mono',monospace;
  font-size:8px;letter-spacing:0.28em;
  color:var(--muted);text-transform:uppercase;
}
.pf-pips{display:flex;gap:6px}
.pip{
  width:18px;height:3px;border-radius:2px;
  background:rgba(0,200,255,0.08);
  transition:background 0.5s,box-shadow 0.5s;
}
.pip.lit{background:rgba(0,200,255,0.6);box-shadow:0 0 5px rgba(0,200,255,0.45)}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-7px)}
  35%{transform:translateX(7px)}
  55%{transform:translateX(-5px)}
  75%{transform:translateX(5px)}
}
.shake{animation:shake 0.44s ease-in-out}
.hub-return-link{display:block;text-align:center;margin-top:10px;font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.25em;color:rgba(0,200,255,0.28);text-decoration:none;text-transform:uppercase;transition:color 0.2s;}
.hub-return-link:hover{color:rgba(0,200,255,0.6);}
.reset-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:10;background:none;border:1px solid rgba(255,255,255,0.05);border-radius:4px;color:rgba(255,255,255,0.1);font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.2em;padding:9px 20px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;white-space:nowrap}
.reset-btn:hover{border-color:rgba(255,255,255,0.12);color:rgba(255,255,255,0.2)}
@media(max-width:768px){
  .auth-panel{width:94vw;min-width:0}
  .panel-topbar{padding:10px 16px}
  .panel-body{padding:22px 16px 24px}
  .warning-title{margin-bottom:16px}
  .wt-sub{font-size:12px !important}
  .ops-stack{gap:12px}
  .op-slot{gap:10px}
  .slot-pill{padding:10px 14px;gap:8px}
  .op-input{font-size:15px;letter-spacing:0.15em}
  .submit-row{margin-top:22px}
  .submit-btn{width:100%;padding:14px;font-size:11px;letter-spacing:3px}
  .hub-return-link{font-size:11px;letter-spacing:0.2em;margin-top:8px}
  .reset-btn{font-size:8px;padding:8px 16px;bottom:16px}
}
</style>
</head>

<div class="auth-panel" id="auth-panel">

  <div class="panel-topbar">
    <div class="topbar-id">NXS-MCH-001 · Auth Terminal</div>
    <div class="topbar-status">
      <div class="status-dot" id="status-dot"></div>
      <div class="status-txt" id="status-txt">System Fault</div>
    </div>
  </div>

  <div class="scan-line"></div>

  <div class="panel-body">

    <div class="warning-title">
      <div class="wt-label">⚠ &nbsp; Required &nbsp; ⚠</div>
      <div class="wt-main">Complete the Course<br>to <span>Restore the Machine.</span></div>
      <div class="wt-sub">Once you find the passcode, enter it below.</div>
    </div>

    <div class="divider"></div>

    <div class="ops-stack">

      <div class="op-slot" id="slot-operator">
        <div class="slot-pill" id="pill-operator">
          <input class="op-input" id="input-operator" type="password"
            placeholder="Enter Code"
            autocomplete="off" spellcheck="false"
            oninput="onInput('operator')" onkeydown="onKey(event)">
          <span class="sealed-name" id="sname-operator">Operator — Confirmed</span>
          <div class="slot-check" id="check-operator">
            <svg width="13" height="10" viewBox="0 0 13 10"><polyline points="1.5,5 5,8.5 11.5,1.5"/></svg>
          </div>
        </div>
        <div class="slot-sealed-label" id="seal-operator">Slot Sealed</div>
      </div>

    </div>

    <button class="restore-btn" id="restore-btn" onclick="attemptActivation()">Restore Machine</button>
    <div class="error-line" id="error-line">Authentication failed — verify passcode and retry</div>
    <a class="hub-return-link" id="hub-return-link" href="../hub.html">Return to Hub</a>

  </div>

  <div class="panel-footer">
    <div class="pf-mono" id="footer-count">0 / 1 Authenticated</div>
    <div class="pf-pips">
      <div class="pip" id="pip-0"></div>
    </div>
    <div class="pf-mono">Rev 1.0</div>
  </div>

</div>
<button class="reset-btn" style="display:none" onclick="adminReset()">[ Machine Input Reset ]</button>

<script>
const CODES={operator:'76xJFp*w!W3*'};
const OPS=['operator'];
const confirmed={operator:false};
const STORAGE='nexus_machine_inputs';
function playS(src,vol){if(vol===undefined)vol=0.4;const a=new Audio(src);a.volume=vol;a.play().catch(function(){});return a;}
function pickPower(){return '../audio/sfx/power-on-'+Math.ceil(Math.random()*3)+'.mp3';}

function save(){
  const d={};
  OPS.forEach(function(op){d[op]=document.getElementById('input-'+op).value;});
  localStorage.setItem(STORAGE,JSON.stringify(d));
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORAGE)||'{}');
    OPS.forEach(function(op){if(d[op])document.getElementById('input-'+op).value=d[op];});
    OPS.forEach(function(op){onInput(op,true);});
  }catch(e){}
}
function onInput(op,silent){
  if(confirmed[op])return;
  if(!silent)save();
  const val=document.getElementById('input-'+op).value.trim();
  if(val===CODES[op])sealSlot(op);
}
function sealSlot(op){
  if(confirmed[op])return;
  confirmed[op]=true;
  playS('../audio/sfx/password-confirm.mp3',0.1);
  const pill=document.getElementById('pill-'+op);
  const input=document.getElementById('input-'+op);
  const check=document.getElementById('check-'+op);
  const sname=document.getElementById('sname-'+op);
  const seal=document.getElementById('seal-'+op);
  input.style.display='none';
  sname.style.display='block';
  pill.classList.add('confirmed');
  check.style.display='flex';
  seal.style.display='block';
  document.getElementById('pip-0').classList.add('lit');
  updateStatus();
}
function updateStatus(){
  const n=OPS.filter(function(op){return confirmed[op];}).length;
  document.getElementById('footer-count').textContent=n+' / 1 Authenticated';
  if(n===1){
    document.getElementById('restore-btn').classList.add('all-ok');
    document.getElementById('restore-btn').textContent='Activate — Operator Confirmed';
    document.getElementById('status-dot').classList.add('ok');
    const st=document.getElementById('status-txt');
    st.classList.add('ok');st.textContent='Ready';
  }
}
function flashTint(rgba,ms){
  const el=document.getElementById('page-tint');
  el.style.background=rgba;
  setTimeout(function(){el.style.background='transparent';},ms);
}
function attemptActivation(){
  if(confirmed.operator){
    localStorage.setItem('nexus_machine_unlocked','true');
    playS(pickPower(),0.1);
    flashTint('rgba(0,200,255,0.1)',900);
    const btn=document.getElementById('restore-btn');
    btn.textContent='Signal Acquired — Restoring...';
    btn.style.animation='none';
    setTimeout(function(){window.location.href='../machine/activated.html';},1100);
    return;
  }
  playS('../audio/sfx/robot-error.wav',0.1);
  OPS.forEach(function(op){
    if(confirmed[op])return;
    const val=document.getElementById('input-'+op).value.trim();
    if(val&&val!==CODES[op]){
      const pill=document.getElementById('pill-'+op);
      pill.classList.add('error-flash');
      setTimeout(function(){pill.classList.remove('error-flash');},2200);
    }
  });
  const panel=document.getElementById('auth-panel');
  panel.classList.add('shake');
  setTimeout(function(){panel.classList.remove('shake');},460);
  flashTint('rgba(180,0,0,0.07)',550);
  const err=document.getElementById('error-line');
  err.classList.add('show');
  setTimeout(function(){err.classList.remove('show');},3600);
}
function onKey(e){if(e.key==='Enter')attemptActivation();}
function adminReset(){
  if(confirm('Reset machine input?')){
    localStorage.removeItem('nexus_machine_inputs');
    localStorage.removeItem('nexus_machine_unlocked');
    window.location.reload();
  }
}
document.addEventListener('keydown',function(e){
  if(e.shiftKey&&e.altKey&&e.key==='R'){
    var btn=document.querySelector('.reset-btn');
    if(btn)btn.style.display=btn.style.display==='block'?'none':'block';
  }
});
load();
(function(){
  var VOL=0.29,_ctx=null,_gain=null,_buf=null,_src=null,_on=false;
  function ctx(){
    if(!_ctx){
      _ctx=new(window.AudioContext||window.webkitAudioContext)();
      _gain=_ctx.createGain();_gain.gain.value=VOL;_gain.connect(_ctx.destination);
      fetch('../audio/music/machine-ambient.wav').then(function(r){return r.arrayBuffer();})
        .then(function(ab){return _ctx.decodeAudioData(ab);})
        .then(function(buf){_buf=buf;if(_on)go();}).catch(function(){});
    }
    return _ctx;
  }
  function go(){
    if(!_buf||_src)return;
    _src=_ctx.createBufferSource();_src.buffer=_buf;_src.loop=true;
    _src.connect(_gain);_src.start(0);
  }
  function start(){
    var c=ctx();_on=true;
    if(c.state==='suspended')c.resume().then(function(){go();});
    else go();
  }
  window._machineAmb={
    get paused(){return !_on||!_ctx||_ctx.state!=='running';},
    play:function(){start();return Promise.resolve();}
  };
  (window.__bgAudio=window.__bgAudio||[]).push(window._machineAmb);
  start();
  var _h=function(){start();document.removeEventListener('click',_h);document.removeEventListener('touchstart',_h);};
  document.addEventListener('click',_h);document.addEventListener('touchstart',_h);
  window.addEventListener('pageshow',function(e){if(e.persisted){_on=false;_src=null;start();}});
})();
(function(){
  function schedRecurring(){
    setTimeout(function(){
      playS('../audio/sfx/decrypting-noise.wav',0.05);
      schedRecurring();
    },20000+Math.random()*30000);
  }
  setTimeout(function(){
    playS('../audio/sfx/decrypting-noise.wav',0.05);
    schedRecurring();
  },5000+Math.random()*4000);
})();
</script>
<script>(function(){var op=localStorage.getItem('nexus_current_operator')||'operator';var l=document.getElementById('hub-return-link');if(l)l.href='../hub.html';})();</script>
<script src="../nexus-transition.js"></script>
</body>
