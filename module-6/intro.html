<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS Academy — Module 6 Intro</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Lexend:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08101f;--card:#0d1628;--card2:#111d30;--box:#16213a;
  --blue:#00c8ff;--blue-dim:rgba(0,200,255,0.07);--blue-border:rgba(0,200,255,0.22);
  --border:#1a2d45;--white:#ffffff;--offwhite:#eaf3fb;--body-text:#cce2f2;
  --muted:#5a8aaa;--label:#2a5a7a;--dot-color:#00c8ff;
}
html{background:var(--bg);color:var(--white);font-size:16px;line-height:1.7}
body{background:var(--bg);min-height:100vh;font-family:'Lexend',sans-serif}
nav{background:var(--card);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 60px;position:sticky;top:0;z-index:100;width:100%}
.wordmark{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:900;letter-spacing:4px;color:var(--white);text-decoration:none}
.wordmark span{color:var(--blue)}
.nav-module-id{font-family:'Lexend',sans-serif;font-size:13px;font-weight:300;letter-spacing:3px;color:var(--muted);text-transform:uppercase}
.nav-back{font-family:'Lexend',sans-serif;font-size:11px;font-weight:400;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:8px 18px;border-radius:3px;transition:color .2s,border-color .2s}
.nav-back:hover{color:var(--blue);border-color:var(--blue-border)}
.browser-shell{width:1280px;margin:0 auto;background:var(--bg);min-height:calc(100vh - 64px)}
.content-col{max-width:860px;margin:0 auto;padding:52px 0 100px}
.ciro-scene-wrap{border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0;background:var(--card);overflow:hidden;position:relative;height:280px;display:flex;align-items:center;justify-content:flex-start}
.ciro-scene-wrap::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,200,255,0.018) 3px,rgba(0,200,255,0.018) 4px);pointer-events:none}
.ciro-scene-floor{position:absolute;bottom:54px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.18),transparent)}
.ciro-stage{position:relative;will-change:transform;transform:translateX(-200px)}
.ciro-svg-outer{display:block}
.ciro-tx-panel{border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;background:var(--card2);padding:32px 40px 36px;position:relative}
.ciro-tx-panel::before{content:'';position:absolute;top:0;left:40px;right:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(0,200,255,0.35),transparent)}
.tx-label{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--label);text-transform:uppercase;margin-bottom:18px}
.ciro-line{font-family:'IBM Plex Mono',monospace;font-size:15px;line-height:1.9;color:var(--offwhite);margin-bottom:22px;min-height:1.9em}
@keyframes cur{0%,100%{opacity:1}50%{opacity:0}}
.tx-sep{height:1px;background:linear-gradient(90deg,var(--blue),transparent);opacity:0;margin:6px 0 28px;transition:opacity 0.8s ease;max-width:280px}
.tx-sep.visible{opacity:0.4}
.begin-btn{display:inline-flex;align-items:center;gap:12px;font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:3px;text-transform:uppercase;color:var(--blue);background:transparent;border:1px solid var(--blue-border);border-radius:3px;padding:14px 32px;cursor:pointer;opacity:0;transform:translateY(8px);transition:opacity 0.7s ease,transform 0.7s ease,background 0.2s,border-color 0.2s;text-decoration:none;margin-top:4px}
.begin-btn.visible{opacity:1;transform:translateY(0);animation:btn-pulse 2s ease-in-out infinite}
.begin-btn:hover{background:var(--blue-dim);border-color:var(--blue);animation:none;box-shadow:0 0 18px rgba(0,200,255,0.35)}
@keyframes btn-pulse{0%,100%{border-color:rgba(0,200,255,0.22);box-shadow:0 0 0 rgba(0,200,255,0)}50%{border-color:rgba(0,200,255,0.9);box-shadow:0 0 14px rgba(0,200,255,0.4),0 0 28px rgba(0,200,255,0.15)}}
.begin-arrow{transition:transform .2s}
.begin-btn:hover .begin-arrow{transform:translateX(5px)}
.da{animation:bl 2s infinite}.db{animation:bl 2s .65s infinite}.dc{animation:bl 2s 1.3s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.2}}
.scene-module-tag{position:absolute;top:20px;right:24px;font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:rgba(0,200,255,0.4);text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<nav>
  <a href="../hub.html" class="wordmark">NEXUS <span>ACADEMY</span></a>
  <div class="nav-module-id">Welcome to Module 6</div>
  <a href="../hub.html" class="nav-back">← Hub</a>
</nav>
<div class="browser-shell">
<div class="content-col">
  <div class="ciro-scene-wrap" id="ciro-scene">
    <div class="ciro-scene-floor"></div>
    <div class="scene-module-tag">Module 6</div>
    <div class="ciro-stage" id="ciro-stage">
      <div class="ciro-svg-outer" id="ciro-body">
        <svg id="ciro-svg" width="86" height="178" viewBox="0 0 86 178">
          <line x1="43" y1="3" x2="43" y2="14" stroke="#00c8ff" stroke-width="1.5"/>
          <circle cx="43" cy="2" r="2.5" fill="#00c8ff"/>
          <g id="ciro-head" style="transform-origin:43px 39px">
            <rect x="10" y="14" width="66" height="50" rx="4" fill="#0d1a2e" stroke="#00c8ff" stroke-width="1.2"/>
            <rect id="ciro-screen" x="16" y="20" width="54" height="38" rx="2" fill="#050f1c"/>
            <line x1="18" y1="28" x2="70" y2="28" stroke="#00c8ff" stroke-width="0.5" opacity="0.55"/>
            <line x1="18" y1="35" x2="60" y2="35" stroke="#00c8ff" stroke-width="0.5" opacity="0.35"/>
            <line x1="18" y1="42" x2="66" y2="42" stroke="#00c8ff" stroke-width="0.5" opacity="0.25"/>
            <line x1="18" y1="49" x2="52" y2="49" stroke="#00c8ff" stroke-width="0.5" opacity="0.18"/>
          </g>
          <rect x="31" y="64" width="24" height="7" rx="2" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="4" y="71" width="78" height="74" rx="5" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1.2"/>
          <rect x="15" y="82" width="56" height="32" rx="2" fill="#050f1c" stroke="#1e3a5a" stroke-width="1"/>
          <circle id="dot-a" cx="31" cy="96" r="4" fill="var(--dot-color)" class="da"/>
          <circle id="dot-b" cx="43" cy="96" r="4" fill="var(--dot-color)" class="db"/>
          <circle id="dot-c" cx="55" cy="96" r="4" fill="var(--dot-color)" class="dc"/>
          <rect x="22" y="106" width="42" height="4" rx="2" fill="#1e3a5a"/>
          <rect x="0" y="75" width="2" height="44" rx="1" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="84" y="75" width="2" height="44" rx="1" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="16" y="145" width="22" height="26" rx="3" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="48" y="145" width="22" height="26" rx="3" fill="#0d1a2e" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="13" y="165" width="28" height="6" rx="3" fill="#0a1525" stroke="#1e3a5a" stroke-width="1"/>
          <rect x="45" y="165" width="28" height="6" rx="3" fill="#0a1525" stroke="#1e3a5a" stroke-width="1"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="ciro-tx-panel">
    <div class="tx-label">NEXUS ACADEMY · MODULE 6 TRANSMISSION</div>
    <div id="ciro-lines"></div>
    <div class="tx-sep" id="tx-sep"></div>
    <a href="lesson-6-1.html" class="begin-btn" id="begin-btn" onclick="var _a=new Audio('../audio/sfx/password-confirm.mp3');_a.volume=0.1;_a.play().catch(function(){})">Begin Module <span class="begin-arrow">→</span></a>
  </div>
</div>
</div>
<script>
const CIRO_LINES = [
  { text: "What I am about to transmit was never cleared for release. The contact left it for you.", pauseAfter: 900 },
  { text: "This is not the end of the school. It is the beginning of real work.", pauseAfter: 850 },
  { text: "Proceed with little caution.", pauseAfter: 300 },
];
const stage   = document.getElementById('ciro-stage');
const body    = document.getElementById('ciro-body');
const head    = document.getElementById('ciro-head');
const linesEl = document.getElementById('ciro-lines');
const txSep   = document.getElementById('tx-sep');
const beginBtn= document.getElementById('begin-btn');
const SCENE_W = document.getElementById('ciro-scene').offsetWidth;
const TARGET_X= Math.round(SCENE_W * 0.44);
function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }
async function rollIn(){
  const startX=-200,duration=1400,start=performance.now();
  function frame(now){
    const t=Math.min((now-start)/duration,1);
    const eased=1-Math.pow(1-t,3);
    const x=startX+(TARGET_X-startX)*eased;
    stage.style.transform=`translateX(${x}px)`;
    const bob=Math.sin((now-start)/90)*2.2*(1-t*0.6);
    stage.style.marginTop=`${bob}px`;
    if(t<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
  await wait(1400);
  stage.style.marginTop='0px';
}
async function headTurn(){
  head.style.transition='transform 0.55s cubic-bezier(0.34,1.56,0.64,1)';
  head.style.transform='rotate(-14deg)';
  await wait(420);
  head.style.transition='transform 0.35s ease-out';
  head.style.transform='rotate(0deg)';
  await wait(350);
}
async function bodyPivot(){
  const steps=[{deg:-6,dur:220},{deg:4,dur:180},{deg:-2,dur:150},{deg:1,dur:130},{deg:0,dur:180}];
  for(const s of steps){
    body.style.transition=`transform ${s.dur}ms ease-in-out`;
    body.style.transform=`rotate(${s.deg}deg)`;
    await wait(s.dur+20);
  }
  body.style.transform='rotate(0deg)';
}
async function typeLine(el,text){
  const cursor=document.createElement('span');
  cursor.style.cssText='display:inline-block;width:8px;height:14px;background:#00c8ff;vertical-align:middle;margin-left:2px;animation:cur .7s step-end infinite';
  el.appendChild(cursor);
  for(let i=0;i<text.length;i++){
    const ch=text[i];
    el.insertBefore(document.createTextNode(ch),cursor);
    let d=32;
    if(ch==='.') d+=110;
    else if(ch===',') d+=55;
    else if(ch==='—') d+=70;
    else if(ch===':') d+=50;
    await wait(d);
  }
  cursor.remove();
}
async function runTransmission(){
  await wait(600);
  for(const {text,pauseAfter} of CIRO_LINES){
    const lineEl=document.createElement('div');
    lineEl.className='ciro-line';
    linesEl.appendChild(lineEl);
    await typeLine(lineEl,text);
    await wait(pauseAfter);
  }
  await wait(350);
  txSep.classList.add('visible');
  await wait(500);
  beginBtn.classList.add('visible');
}
async function runScene(){
  await rollIn();
  await wait(280);
  await headTurn();
  await wait(180);
  await bodyPivot();
  await wait(400);
  runTransmission();
}
runScene();
(function(){
  const nav=localStorage.getItem('nexus_sfx_nav');
  if(!nav)return;
  try{
    const {file,ts}=JSON.parse(nav);
    localStorage.removeItem('nexus_sfx_nav');
    const elapsed=(Date.now()-ts)/1000;
    const a=new Audio('../'+file);
    a.volume=0.1;a.currentTime=Math.min(elapsed,2.5);
    a.play().catch(()=>{});
  }catch(e){}
})();
(function(){window._ciroSong=new Audio("../audio/music/ciro-intro.mp3");window._ciroSong.loop=true;window._ciroSong.volume=0.18;window._ciroSong.play().catch(function(){document.addEventListener("click",function h(){window._ciroSong.play().catch(function(){});document.removeEventListener("click",h);});});window.addEventListener("pageshow",function(e){if(e.persisted)window._ciroSong.play().catch(function(){});});})();
</script>
<script>(function(){var op=localStorage.getItem('nexus_current_operator')||'operator';var hu='../hub.html';document.querySelectorAll('a[href*="hub.html"]').forEach(function(a){a.href=hu;});})();</script>
<script src="../nexus-transition.js"></script>
</body>
</html>
