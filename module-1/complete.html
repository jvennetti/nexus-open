.completion-badge.animate-in::before{opacity:1}
.completion-badge::after{content:'';position:absolute;inset:-18px;border-radius:50%;border:1px dashed rgba(255,255,255,0.12);animation:ring-spin 18s linear infinite}

.da{animation:bl 2s infinite}.db{animation:bl 2s .65s infinite}.dc{animation:bl 2s 1.3s infinite}

<script>
const _compMusic=new Audio('../audio/music/module-complete.mp3');_compMusic.loop=true;(window.__bgAudio=window.__bgAudio||[]).push(_compMusic);_compMusic.volume=0.4;_compMusic.play().catch(function(){var _h=function(){_compMusic.play().catch(function(){});document.removeEventListener('click',_h);document.removeEventListener('touchstart',_h);};document.addEventListener('click',_h);document.addEventListener('touchstart',_h,{passive:true});});window.addEventListener('pageshow',function(e){if(e.persisted)_compMusic.play().catch(function(){});});
const OPERATOR   = localStorage.getItem('nexus_current_operator')||'operator';
const MODULE_KEY = 'mod1';
const BADGE_KEY  = 'boot_sequence';

const CIRO_LINES = [
  { text: "You have seen a glimpse of what's coming.", pauseAfter: 900 },
  { text: "Most people who have that information do nothing with it. I—", pauseAfter: 0, lightPause: '#ffcc00' },
  { text: "I believe you are not in that group.", pauseAfter: 800 },
  { text: "Well done, Operator in training.", pauseAfter: 700 },
  { text: "You've taken the first step. System boot confirmed.", pauseAfter: 300 },
];

function writeComplete(){
  try{
    const raw = localStorage.getItem('nexus_'+OPERATOR);
    const s   = raw ? JSON.parse(raw) : {};
    s[MODULE_KEY+'_complete'] = true;
    s['badge_'+BADGE_KEY] = true;
    localStorage.setItem('nexus_'+OPERATOR, JSON.stringify(s));
    const keysToRemove = [];
    for(let i = 0; i < localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith('nexus_ts_') && k.includes('module-1')) keysToRemove.push(k);
    }
    keysToRemove.forEach(k => localStorage.removeItem(k));
  } catch(e){ console.warn('nexus localStorage write failed', e); }
}

function pingHub(){
  try{
    const target = window.opener || window.parent;
    if(target && target !== window){
      target.postMessage({ type:'MODULE_COMPLETE', moduleKey:MODULE_KEY, operator:OPERATOR }, '*');
      target.postMessage({ type:'BADGE_EARNED', badgeKey:BADGE_KEY, operator:OPERATOR }, '*');
    }
  } catch(e){}
}

function setLights(color){
  ['dot-a','dot-b','dot-c'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.setAttribute('fill', color);
  });
}

function runReveal(){
  setTimeout(function(){playS("../audio/sfx/wait-sound.wav",0.1);},200);
  setTimeout(()=> document.getElementById('completion-badge').classList.add('animate-in'), 200);
  setTimeout(()=> document.getElementById('label-2').classList.add('animate-in'), 500);
  setTimeout(()=> document.getElementById('label-3').classList.add('animate-in'), 680);
  setTimeout(()=> document.getElementById('debrief-wrap').classList.add('animate-in'), 900);
  setTimeout(runCiro, 1100);
}

function wait(ms){ return new Promise(r=>setTimeout(r,ms)); }

async function typeLine(el, text){
  const cursor = document.createElement('span');
  cursor.style.cssText = 'display:inline-block;width:8px;height:14px;background:#00c8ff;vertical-align:middle;margin-left:2px;animation:cur .7s step-end infinite';
  el.appendChild(cursor);
  for(let i=0;i<text.length;i++){
    const ch = text[i];
    el.insertBefore(document.createTextNode(ch), cursor);
    let d = 30;
    if(ch==='.') d+=110;
    else if(ch===',') d+=55;
    else if(ch==='—') d+=70;
    await wait(d);
  }
  cursor.remove();
}

async function runCiro(){
  const container = document.getElementById('ciro-lines');
  await wait(300);
  for(const { text, pauseAfter, lightPause } of CIRO_LINES){
    const lineEl = document.createElement('div');
    lineEl.className = 'ciro-line';
    container.appendChild(lineEl);
    await typeLine(lineEl, text);
    if(lightPause){
      setLights(lightPause);
      await wait(2400);
      setLights('#00c8ff');
      await wait(500);
    } else {
      await wait(pauseAfter);
    }
  }
  await wait(400);
  document.getElementById('hub-cta').classList.add('visible');
}

writeComplete();
pingHub();
runReveal();

  var css=[
    '*{box-sizing:border-box;margin:0;padding:0}',

<script>
(function(){
  var C=document.createElement('canvas');
  C.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:100000';
  document.body.appendChild(C);
  var ctx=C.getContext('2d');
  C.width=innerWidth;C.height=innerHeight;
  var COLORS=['#ffffff','#f0f8ff','#e8f4ff','#ddeeff','#f8faff'];
  var pts=[];
  for(var i=0;i<240;i++){
    var spd=4+Math.random()*10;
    var ang=Math.random()*Math.PI*2;
    pts.push({x:C.width/2+(Math.random()-0.5)*80,y:C.height*0.28+(Math.random()-0.5)*40,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-3,w:5+Math.random()*9,h:3+Math.random()*5,r:Math.random()*Math.PI*2,vr:(Math.random()-0.5)*0.17,c:COLORS[i%COLORS.length],a:1,t:0,life:130+Math.floor(Math.random()*110)});
  }
  function frame(){
    ctx.clearRect(0,0,C.width,C.height);
    var alive=false;
    pts.forEach(function(p){p.t++;if(p.t>=p.life)return;p.vx*=0.985;p.vy+=0.16;p.x+=p.vx;p.y+=p.vy;p.r+=p.vr;p.a=p.t<p.life*0.72?1:1-(p.t-p.life*0.72)/(p.life*0.28);if(p.y>C.height+30)return;alive=true;ctx.save();ctx.globalAlpha=p.a;ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.fillStyle=p.c;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();});
    if(alive)requestAnimationFrame(frame);else C.remove();
  }
  setTimeout(function(){requestAnimationFrame(frame);},520);
})();
</script>
